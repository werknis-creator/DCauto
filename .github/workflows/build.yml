name: GTA SA DC Simulant Fixed

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: kazade/dreamcast-sdk
    
    steps:
      - name: "Pobranie kodu gry z repozytorium"
        uses: actions/checkout@v4

      - name: "Pobranie Silnika Simulant i Fix Brakujacych Plikow"
        run: |
          source /etc/bash.bashrc
          echo "Klonowanie silnika Simulant..."
          git clone --recursive https://github.com/Kazade/simulant-engine.git
          
          echo "Tworzenie brakujacych folderow i plikow, aby oszukac CMake..."
          mkdir -p simulant-engine/assets
          mkdir -p simulant-engine/cmake_modules
          touch simulant-engine/cmake_modules/simulant-config.cmake
          
          mkdir -p simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_complex_sh4.inl.h
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_trig_sh4.inl.h
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_mem_sh4.inl.h
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_quat_sh4.inl.h
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_matrix_sh4.inl.h
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_vector_sh4.inl.h
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_scalar_sh4.inl.h
          touch simulant-engine/deps/sh4zam/include/sh4zam/inline/sh4/shz_xmtrx_sh4.inl.h

      - name: "Kompilacja i Instalacja Silnika Simulant"
        run: |
          source /etc/bash.bashrc
          echo "Wchodze do folderu silnika..."
          cd simulant-engine
          mkdir build && cd build
          
          echo "Konfiguracja CMake..."
          cmake -DCMAKE_TOOLCHAIN_FILE=../toolchains/Dreamcast.cmake -DCMAKE_BUILD_TYPE=Release ..
          
          echo "Kompilacja silnika..."
          make -j4
          
          echo "Instalacja silnika do toolchaina..."
          make install

      - name: "Budowa Wlasciwej Gry"
        run: |
          source /etc/bash.bashrc
          mkdir -p game_build
          echo "Kompilacja gry bezposrednio kompilatorem kos-c++..."
          kos-c++ -O2 -I/opt/toolchains/dc/kos/addons/include -o game_build/my_game.elf $GITHUB_WORKSPACE/main.cpp -L/opt/toolchains/dc/kos/addons/lib/dreamcast -lsimulant -lGLdc -lsh4zam

      - name: "Pakowanie do formatu CDI Obraz plyty"
        run: |
          source /etc/bash.bashrc
          cd game_build
          
          echo "Konwersja ELF na BIN..."
          $KOS_OBJCOPY -R .stack -O binary my_game.elf main.bin
          
          echo "Scramble szyfrowanie bootsectora..."
          scramble main.bin 1ST_READ.BIN
          
          echo "Tworzenie IP.BIN Logo startowe..."
          echo "Hardware ID   : SEGA SEGAKATANA" > ip.txt
          echo "Maker ID      : SEGA ENTERPRISES" >> ip.txt
          echo "Device Info   : 0x0000 GD-ROM1/1 0000000000000000" >> ip.txt
          echo "Area Symbols  : 0x00000000" >> ip.txt
          echo "Peripherals   : 0x00000000" >> ip.txt
          echo "Product Number: 0000000000000000" >> ip.txt
          echo "Version       : V1.000" >> ip.txt
          echo "Release Date  : 20230101" >> ip.txt
          echo "Boot Filename : 1ST_READ.BIN" >> ip.txt
          echo "SW Maker Name : GITHUB" >> ip.txt
          echo "Game Title    : GTA SA DC" >> ip.txt
          makeip ip.txt IP.BIN
          
          echo "Tworzenie obrazu ISO..."
          genisoimage -V GTA_SA_DC -G IP.BIN -joliet -rock -l -o game.iso 1ST_READ.BIN
          
          echo "Konwersja ISO na finalny plik CDI..."
          cdi4dc game.iso MojaGra_GTA.cdi -d

      - name: "Zapisanie pliku .cdi do pobrania Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GTA-SA-CDI-Final
          path: game_build/MojaGra_GTA.cdi
