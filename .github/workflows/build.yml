name: GTA SA DC (Zloty Klucz)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # Uruchamiamy CAY JOB wewnatrz kontenera KOS!
    container: nold360/kallistios-sdk
    
    steps:
      # Uzywamy @v2 (Node 12), ktory dziala na starym GLIBC w kontenerze KOS
      - name: Pobranie kodu
        uses: actions/checkout@v2

      - name: Kompilacja i Pakowanie
        run: |
          set -e # Zatrzymaj przy bledzie i pokaz prawde!
          echo "=== Kompilacja ==="
          make
          echo "=== Tworzenie BIN ==="
          sh-elf-objcopy -R .stack -O binary my_game.elf main.bin
          echo "=== Scramble ==="
          scramble main.bin 1ST_READ.BIN
          echo "=== IP.BIN ==="
          cp /opt/mksdiso/src/makeip/ip.txt /opt/mksdiso/src/makeip/IP.TMPL .
          makeip ip.txt IP.BIN
          echo "=== ISO i CDI ==="
          genisoimage -V MOJA_GRA -G IP.BIN -joliet -rock -l -o mygame.iso 1ST_READ.BIN
          cdi4dc mygame.iso MojaGra_GTA.cdi -d
          ls -la MojaGra_GTA.cdi

      # Uzywamy @v2 (Node 12), ktory bez problemu odczyta plik
      - name: Zapisanie pliku
        uses: actions/upload-artifact@v2
        with:
          name: Dreamcast-CDI
          path: MojaGra_GTA.cdi
