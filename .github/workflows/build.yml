name: GTA SA DC (Rentgen)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Kompilacja i Pakowanie (X-Ray)
        run: |
          docker run --rm -v ${{ github.workspace }}:/src -w /src nold360/kallistios-sdk /bin/bash -c "
            set -e # Zatrzymaj i pokaz blad przy pierwszej pomyłce!
            echo '=== KROK 1: KOMPILACJA C ==='
            make
            echo '=== KROK 2: TWORZENIE BIN ==='
            sh-elf-objcopy -R .stack -O binary my_game.elf main.bin
            echo '=== KROK 3: SCRAMBLE ==='
            scramble main.bin 1ST_READ.BIN
            echo '=== KROK 4: IP.BIN ==='
            cp /opt/mksdiso/src/makeip/ip.txt .
            makeip ip.txt IP.BIN
            echo '=== KROK 5: ISO I CDI ==='
            genisoimage -V MOJA_GRA -G IP.BIN -joliet -rock -l -o mygame.iso 1ST_READ.BIN
            cdi4dc mygame.iso MojaGra.cdi -d
            ls -lh MojaGra.cdi
          "

      - name: Zapisz Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast-CDI
          path: MojaGra.cdi
