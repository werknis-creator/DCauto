name: GTA SA DC (Simulant)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: kazade/dreamcast-sdk
    
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Instalacja zaleznosci i budowa Silnika Simulant
        run: |
          source /etc/bash.bashrc
          git clone --recursive https://github.com/Kazade/simulant-engine.git
          cd simulant-engine
          mkdir build && cd build
          # Kompilacja silnika dla procesora SH4 Dreamcasta
          cmake -DCMAKE_TOOLCHAIN_FILE=../toolchains/Dreamcast.cmake -DSIMULANT_BUILD_SAMPLES=OFF -DSIMULANT_BUILD_TESTS=OFF ..
          make -j4
          make install

      - name: Budowa Gry
        run: |
          source /etc/bash.bashrc
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/simulant-engine/toolchains/Dreamcast.cmake ..
          make -j4

      - name: Tworzenie pliku CDI (Obraz plyty)
        run: |
          source /etc/bash.bashrc
          cd build
          # Konwersja ELF na BIN i tworzenie bootsectora
          $KOS_OBJCOPY -R .stack -O binary my_game.elf main.bin
          scramble main.bin 1ST_READ.BIN
          
          # Tworzenie IP.BIN (logo startowe)
          makeip ip.txt IP.BIN -t "GTA SA DC"
          
          # Tworzenie ISO i konwersja na CDI
          genisoimage -V GTA_SA_DC -G IP.BIN -joliet -rock -l -o game.iso 1ST_READ.BIN
          cdi4dc game.iso MojaGra_GTA.cdi -d

      - name: Zapisanie pliku .cdi do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: GTA-SA-CDI
          path: build/MojaGra_GTA.cdi
