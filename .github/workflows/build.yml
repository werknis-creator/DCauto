name: GTA SA DC Simulant Fixed

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: kazade/dreamcast-sdk
    
    steps:
      - name: "Pobranie kodu gry z repozytorium"
        uses: actions/checkout@v4

      - name: "Pobranie Silnika Simulant"
        run: |
          source /etc/bash.bashrc
          echo "Klonowanie silnika Simulant..."
          git clone --recursive https://github.com/Kazade/simulant-engine.git

      - name: "Generowanie pliku CMakeLists.txt w chmurze"
        run: |
          echo "Tworzenie pliku CMakeLists.txt automatycznie..."
          echo "cmake_minimum_required(VERSION 3.10)" > CMakeLists.txt
          echo "project(GTASA_DC CXX)" >> CMakeLists.txt
          echo "set(CMAKE_CXX_STANDARD 11)" >> CMakeLists.txt
          echo "add_subdirectory(simulant-engine)" >> CMakeLists.txt
          echo "add_executable(my_game.elf main.cpp)" >> CMakeLists.txt
          echo "target_link_libraries(my_game.elf PRIVATE simulant)" >> CMakeLists.txt
          echo "target_include_directories(my_game.elf PRIVATE \${CMAKE_CURRENT_SOURCE_DIR}/simulant-engine/simulant/include)" >> CMakeLists.txt
          echo "Plik CMakeLists.txt zostal stworzony!"

      - name: "Konfiguracja i Kompilacja Gry oraz Silnika"
        run: |
          source /etc/bash.bashrc
          echo "Tworzenie katalogu build..."
          mkdir -p game_build
          cd game_build
          
          echo "Uruchamianie CMake..."
          cmake -DCMAKE_TOOLCHAIN_FILE=$GITHUB_WORKSPACE/simulant-engine/toolchains/Dreamcast.cmake -DCMAKE_BUILD_TYPE=Release $GITHUB_WORKSPACE
          
          echo "Kompilacja (Silnik + Gra)..."
          make -j4

      - name: "Pakowanie do formatu CDI Obraz plyty"
        run: |
          source /etc/bash.bashrc
          cd game_build
          
          echo "Konwersja ELF na BIN..."
          $KOS_OBJCOPY -R .stack -O binary my_game.elf main.bin
          
          echo "Scramble szyfrowanie bootsectora..."
          scramble main.bin 1ST_READ.BIN
          
          echo "Tworzenie IP.BIN Logo startowe..."
          echo "Hardware ID   : SEGA SEGAKATANA" > ip.txt
          echo "Maker ID      : SEGA ENTERPRISES" >> ip.txt
          echo "Device Info   : 0x0000 GD-ROM1/1 0000000000000000" >> ip.txt
          echo "Area Symbols  : 0x00000000" >> ip.txt
          echo "Peripherals   : 0x00000000" >> ip.txt
          echo "Product Number: 0000000000000000" >> ip.txt
          echo "Version       : V1.000" >> ip.txt
          echo "Release Date  : 20230101" >> ip.txt
          echo "Boot Filename : 1ST_READ.BIN" >> ip.txt
          echo "SW Maker Name : GITHUB" >> ip.txt
          echo "Game Title    : GTA SA DC" >> ip.txt
          makeip ip.txt IP.BIN
          
          echo "Tworzenie obrazu ISO..."
          genisoimage -V GTA_SA_DC -G IP.BIN -joliet -rock -l -o game.iso 1ST_READ.BIN
          
          echo "Konwersja ISO na finalny plik CDI..."
          cdi4dc game.iso MojaGra_GTA.cdi -d

      - name: "Zapisanie pliku .cdi do pobrania Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: GTA-SA-CDI-Fixed
          path: game_build/MojaGra_GTA.cdi
