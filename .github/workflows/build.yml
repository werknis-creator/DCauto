name: GTA SA DC GLdc

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # NIE UŻYWAMY TUTAJ 'container:', aby uniknąć błędów GLIBC z Node.js
    
    steps:
      - name: "Pobranie kodu"
        uses: actions/checkout@v4

      - name: "Pobranie GLdc na serwerze"
        run: |
          git clone https://github.com/Kazade/GLdc.git

      - name: "Kompilacja GLdc, Gry i tworzenie CDI w Dockerze"
        run: |
          docker run --rm -v ${{ github.workspace }}:/src nold360/kallistios-sdk /bin/bash -c "
            source /opt/toolchains/dc/kos/kos/environ.sh
            cd /src
            
            echo 'Kompilacja GLdc...'
            cd GLdc
            make -j4
            cp libGLdc.a /opt/toolchains/dc/kos/addons/lib/dreamcast/
            mkdir -p /opt/toolchains/dc/kos/addons/include/GL
            cp GL/gl.h GL/glu.h GL/glkos.h /opt/toolchains/dc/kos/addons/include/GL/
            
            cd /src
            echo 'Kompilacja Gry...'
            make
            
            echo 'Tworzenie obrazu plyty...'
            sh-elf-objcopy -R .stack -O binary my_game.elf main.bin
            scramble main.bin 1ST_READ.BIN
            
            echo 'Hardware ID   : SEGA SEGAKATANA' > ip.txt
            echo 'Maker ID      : SEGA ENTERPRISES' >> ip.txt
            echo 'Device Info   : 0x0000 GD-ROM1/1 0000000000000000' >> ip.txt
            echo 'Area Symbols  : 0x00000000' >> ip.txt
            echo 'Peripherals   : 0x00000000' >> ip.txt
            echo 'Product Number: 0000000000000000' >> ip.txt
            echo 'Version       : V1.000' >> ip.txt
            echo 'Release Date  : 20230101' >> ip.txt
            echo 'Boot Filename : 1ST_READ.BIN' >> ip.txt
            echo 'SW Maker Name : GITHUB' >> ip.txt
            echo 'Game Title    : GTA SA DC' >> ip.txt
            
            makeip ip.txt IP.BIN
            genisoimage -V GTA_SA_DC -G IP.BIN -joliet -rock -l -o game.iso 1ST_READ.BIN
            cdi4dc game.iso MojaGra_GTA.cdi -d
          "

      - name: "Zapisanie pliku .cdi"
        uses: actions/upload-artifact@v4
        with:
          name: GTA-SA-CDI
          path: MojaGra_GTA.cdi
