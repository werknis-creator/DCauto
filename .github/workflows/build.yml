name: Dreamcast 3D Ekstraktor

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Uruchomienie skryptu w Dockerze
        run: |
          chmod +x build.sh
          # Uruchamiamy kontener, ale NIE usuwamy go od razu (--name dcbuild)
          docker run --name dcbuild -v ${{ github.workspace }}:/src -w /src nold360/kallistios-sdk ./build.sh
          
      - name: Ekstrakcja CDI (Ominięcie pułapki Roota)
        run: |
          # Kopiujemy plik z kontenera na host. To automatycznie naprawia uprawnienia Linuxa!
          docker cp dcbuild:/src/MojaGra_GTA.cdi ${{ github.workspace }}/MojaGra_GTA.cdi
          docker rm dcbuild
          ls -la ${{ github.workspace }}
          
      - name: Upload Prawdziwego CDI
        uses: actions/upload-artifact@v4
        with:
          name: Dreamcast-GTA-3D
          path: MojaGra_GTA.cdi
          if-no-files-found: error
